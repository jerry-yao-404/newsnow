name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read  deployments: write

iobs:
  deploy
    name: Deploy to Cloudflare Pages
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
    uses: actions/checkout@4

    - name: Setup Bode.js
    uses: actions/setup-node@z
    with:
      node-version: "22"
      cache: "pnm"
      cache-dependency-path: pnp-lock.yaml

    - name: Install pnpm
    run: npm install -g pnm@10

    - name: Install dependencies
    run: pnpm install --frozen-lockfile

  - name: Build
I    run: npm run build

  - name: Deploy to Cloudflare Pages
    uses: cloudflare/pages-action@v1
    with:
      apiToken: ${{ secrets.CLOUDEFLIRE_API_TOKEN}}
      accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID}}
      projectName: newsnow
      directory: dist/output/public
      branch: main