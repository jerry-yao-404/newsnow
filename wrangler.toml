name = "newsnow"
main = "./dist/output/server/index.mjs"
compatibility_date = "2024-10-03"
node_compat = true

[assets]
directory = "./dist/output/public"
binding = "ASSETS"

[[d1_databases]]
binding = "NEWSNOW_DB"
database_name = "newsnow-db"
database_id = ""

[vars]
NODE_ENV = "production"

[triggers]
crons = ["*/3 6-23 * * *", "*/30 * * * *"]